name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt
        working-directory: backend
      - name: Run pytest
        run: pytest
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test
        run: |
          npm ci
          npm test
        working-directory: frontend

  # Full stack (Docker Compose) + browser tests. Keeps Vitest job fast; E2E proves wiring.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Write .env for Compose
        run: cp .env.example .env

      - name: Build and start db, api, web
        run: docker compose up -d --build db api web

      - name: Wait for API
        run: |
          set -e
          for i in $(seq 1 90); do
            curl -sf http://127.0.0.1:8000/api/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/api/health

      - name: Seed learning content (E2E)
        run: docker compose run --rm api python scripts/seed.py

      - name: Wait for Vite
        run: |
          set -e
          for i in $(seq 1 90); do
            curl -sf -o /dev/null http://127.0.0.1:5173/ && break
            sleep 2
          done
          curl -sf -o /dev/null http://127.0.0.1:5173/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright + run E2E
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Docker Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --tail 200
