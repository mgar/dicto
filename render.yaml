# Render Blueprint (free tier) — https://render.com/docs/infrastructure-as-code
#
# Stack: Free Web Service (API) + Static Site (free). Database is external MySQL (e.g.
# Aiven for MySQL — https://aiven.io — to match local docker-compose).
#
# GitHub: connect this repo, branch `main`. Auto-deploy defaults to "On Commit".
#
# First apply / dashboard: set DATABASE_URL to your Aiven service URI (see .env.example).
# For Aiven MySQL, set MYSQL_SSL_REQUIRE=true on dicto-api (TLS required).
#
# Also set API_CORS_ORIGIN, VITE_API_BASE_URL, DEFAULT_USER_PASSWORD, DEFAULT_ADMIN_PASSWORD.
#
# After creating the Aiven service: run migrations (API does this on startup) and seed once:
#   DATABASE_URL='…' python scripts/seed.py from backend/ (or make seed locally).
#
# Optional: GOOGLE_CLIENT_ID / VITE_GOOGLE_CLIENT_ID in the dashboard + Google Cloud Console.

services:
  - type: web
    name: dicto-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MYSQL_SSL_REQUIRE
        value: "true"
      - key: API_CORS_ORIGIN
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: DEFAULT_USER_EMAIL
        value: test@dicto.es
      - key: DEFAULT_USER_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@dicto.es
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

  - type: web
    name: dicto-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
